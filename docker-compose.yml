services:
  qdrant:
    image: qdrant/qdrant:v1.8.4
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'cat < /dev/null > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_CONTEXT_LENGTH: "512"
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'cat < /dev/null > /dev/tcp/localhost/11434'"]
      interval: 15s
      timeout: 10s
      retries: 10
    # GPU support (uncomment if NVIDIA GPU available):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  assistant-api:
    build:
      context: ./src/AssistantApi
      dockerfile: AssistantApi/Dockerfile
    container_name: assistant-api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      TZ: Etc/GMT-4
      Ollama__BaseUrl: http://ollama:11434
      Ollama__Model: qwen2.5:3b
      Ollama__EmbeddingModel: bge-m3
      Qdrant__Host: qdrant
      Qdrant__Port: 6333
      Qdrant__CollectionName: knowledge_base
      Sed__DataPath: /app/sed-data
      Cors__ChatUiOrigin: http://localhost:5173
    volumes:
      - ./data:/app/sed-data:ro
      - ./logs/assistant-api:/app/logs
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy

  chat-ui:
    build:
      context: ./src/ChatUI
      dockerfile: Dockerfile
    container_name: chat-ui
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://assistant-api:8080
    depends_on:
      - assistant-api

volumes:
  qdrant_storage:
  ollama_models:
